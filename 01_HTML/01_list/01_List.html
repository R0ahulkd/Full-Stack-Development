<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    <ol>
        <li>Apple</li>
        <li>Banana</li>
        <li>Cherry</li>
    </ol>
    <ol type="a">
        <li>Apple</li>
        <li>Banana</li>
        <li>Cherry</li>
    </ol>
    <ul>
        <li>Dog</li>
        <li>Cat</li>
        <li>Rabbit</li>
    </ul>
    <dl>
        <dt>HTML</dt>
        <dd>HyperText Markup Language</dd>
    </dl>
</body>
</html>
